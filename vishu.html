<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vishu Collection - Anjana's Boutique</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

  <!-- Header -->
  <header class="bg-white shadow-sm p-6 text-center sticky top-0 z-50">
    <h1 class="text-3xl font-bold text-pink-600">🌸 Vishu Collection</h1>
    <a href="index.html" class="text-gray-500 hover:text-pink-600 text-sm mt-2 inline-block transition">← Back to Home</a>
  </header>

  <!-- Gallery/Products -->
  <main class="p-6 max-w-6xl mx-auto">
    <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Products will be injected here -->
      <div class="col-span-full text-center py-20">
          <div class="animate-pulse flex flex-col items-center">
              <div class="w-12 h-12 bg-pink-200 rounded-full mb-4"></div>
              <div class="h-4 bg-gray-200 w-48 rounded"></div>
          </div>
      </div>
    </div>
  </main>

  <footer class="text-center text-sm text-gray-400 py-10">
      &copy; 2025 Anjana's Design Boutique
  </footer>

  <script type="module">
      import { fetchAndRenderProducts } from './js/main.js';
      document.addEventListener('DOMContentLoaded', () => {
          fetchAndRenderProducts('vishu');
      });
  </script>

</body>
</html>
